services:
  - type: web
    name: greeneatgo-api
    runtime: python
    rootDir: services/api
    buildCommand: pip install -e .
    startCommand: bash start.sh
    healthCheckPath: /v1/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_APP_URL
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: KIWOOMPAY_CPID
        sync: false
      # Optional: not used for payment; required only by automatic cancel/refund API calls.
      - key: KIWOOMPAY_AUTHORIZATION_KEY
        sync: false
      - key: KIWOOMPAY_BASE_URL
        sync: false
      - key: KIWOOMPAY_NOTIFICATION_IPS
        sync: false
      - key: KIWOOMPAY_APP_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: INVITE_EMAIL_FROM
        sync: false
